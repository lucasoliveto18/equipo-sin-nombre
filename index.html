  <script>
    const SHEET_ID = "192LJYUIj-fhgDpciGXRbT7sygegMMhtFKyenQ06etls";

    const SHEETS = {

    };

function showSection(id) {
  document.querySelectorAll("section").forEach(section => {
    section.classList.remove("active");
  });

  document.querySelectorAll("nav button").forEach(button => {
    button.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");

  const button = document.querySelector(`button[onclick="showSection('${id}')"]`);
  if (button) button.classList.add("active");
}

    function googleSheetUrl(sheetName) {
      return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
    }

    async function fetchSheet(sheetName) {
      const response = await fetch(googleSheetUrl(sheetName));
      const text = await response.text();

      const start = text.indexOf("{");
      const end = text.lastIndexOf("}") + 1;
      const json = JSON.parse(text.substring(start, end));

      const cols = json.table.cols.map((col, index) => col.label || `Col ${index + 1}`);

      const rows = json.table.rows.map(row => {
        const obj = {};
        row.c.forEach((cell, index) => {
          obj[cols[index]] = cell ? (cell.f || cell.v || "") : "";
        });
        return obj;
      }).filter(row => {
        return Object.values(row).some(value => String(value).trim() !== "");
      });

      return { cols, rows };
    }

    function updateCards(apertura, descensos) {
      if (apertura.rows.length) {
        const first = apertura.rows[0];
        const playerCol = apertura.cols[0];
        document.getElementById("liderApertura").textContent = first[playerCol] || "-";
      }

      if (descensos.rows.length) {
        const first = descensos.rows[0];
        const playerCol = descensos.cols[0];
        document.getElementById("mejorPromedio").textContent = first[playerCol] || "-";
      }

      const today = new Date();
      document.getElementById("ultimaActualizacion").textContent =
        today.toLocaleDateString("es-AR");
    }

    async function init() {
      try {
        const apertura = await fetchSheet(SHEETS.apertura);console.log(apertura.cols);
        const descensos = await fetchSheet(SHEETS.descensos);console.log(descensos.cols);

        renderTable("aperturaContent", apertura, "apertura");
        renderTable("descensosContent", descensos, "descensos");
        updateCards(apertura, descensos);

      } catch (error) {
        console.error(error);

        document.getElementById("aperturaContent").innerHTML =
          `<div class="error">No se pudo cargar Apertura 2026. Revisá que el Google Sheets esté público.</div>`;

        document.getElementById("descensosContent").innerHTML =
          `<div class="error">No se pudo cargar DESCENSOS. Revisá que el Google Sheets esté público.</div>`;
      }
    }

    init();
  </script>
